# PR checks: lint, typecheck, build. Runs on every push to main and on pull requests.
name: PR checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Native binaries (sharp, lightningcss) are platform-specific;
      # lockfile generated on macOS may lack the Linux variants.
      - name: Install platform-specific binaries for Linux (CI)
        run: npm install --os=linux --cpu=x64 sharp lightningcss

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Next.js build can use standalone if configured
          NEXT_TELEMETRY_DISABLED: 1
